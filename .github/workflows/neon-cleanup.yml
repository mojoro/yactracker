name: Cleanup Neon Branch
on:
  pull_request:
    types: [closed]
jobs:
  cleanup:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: neondatabase/delete-branch-action@v3
        with:
          project_id: ${{ vars.NEON_PROJECT_ID }}
          branch: ci/pr-${{ github.event.number }}
          api_key: ${{ secrets.NEON_API_KEY }}
